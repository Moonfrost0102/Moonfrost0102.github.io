<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三阶魔方实力测评</title>
    <script src="https://cdn.cubing.net/v0/js/scramble-display" type="module"></script>
    <style>
        .showScramble {
            /* 打乱公式 */
            background-color: #ebf8a6;
            width: 301px;
            height: 70px;
            position: absolute;
            left: 50px;
        }

        scramble-display {
            /* 打乱图 */
            width: 150px;
            height: 150px;
            display: block;
            position: absolute;
            left: 203px;
            top: 62px;
        }

        #refreshBtn {
            /* 刷新按钮 */
            width: 60px;
            height: 22px;
            position: absolute;
            left: 230px;
            top: 25px;
            font-size: 11px;
            font-family: "微软雅黑";
            background-color: #ff6e6e;
            border: 2px solid #ff4545;
            border-radius: 5px;
        }

        #scrambleAlg {
            /* 打乱公式 */
            position: absolute;
            left: 5px;
        }

        .copyRight {
            position: absolute;
            left: 50px;
            bottom: 0px;
            font-size: 12px;
            font-family: "微软雅黑";
        }

        #timerBox {
            /* 触摸计时界面 */
            position: absolute;
            left: 50px;
            top: 78px;
            width: 300px;
            height: 274px;
            /* border: 1px solid #000; */
            cursor: pointer;
            display: grid;
            place-items: center;
            font-size: 50px;
            z-index: 2;
        }

        /* 成绩容器 宽230px 高150px */
        .scoreWrap {
            position: absolute;
            left: 50px;
            top: 300px;
            width: 300px;
            height: 200px;
            border: 1px solid #000;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }
        .avgLine {
            padding: 4px;
            border-bottom: 1px solid #000;
            text-align: center;
            font-size: 13px;
        }
        .scrollBox {
            flex: 1;
            overflow-y: auto;
        }
        #scoreTable {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        #scoreTable td, #scoreTable th {
            border: 1px solid #999;
            padding: 3px;
            text-align: center;
        }
        .delBtn {
            cursor: pointer;
            padding: 1px 4px;
        }
        .levelLine {
            padding: 4px;
            border-top: 1px solid #000;
            text-align: center;
            font-size: 13px;
        }
    </style>

</head>

<body>
    <div class="showScramble">
        <div id="scrambleAlg"></div>
        <button id="refreshBtn">下一条</button>
    </div>

    <div id="timerBox">0.000</div>

    <!-- 230*150 成绩面板 -->
    <div class="scoreWrap">
        <div class="avgLine" id="avgText">平均成绩：0.000秒</div>
        <div class="scrollBox">
            <table id="scoreTable">
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>成绩</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="scoreBody"></tbody>
            </table>
        </div>
        <div class="levelLine" id="levelText">暂无成绩</div>
    </div>

    <div class="copyRight">
        <p>制作：@浸寒月° <br>内容仅供娱乐</p>
    </div>

    <!-- 计时器脚本 -->
    <script>
        let start, timer, running = false;
        const timerBox = document.getElementById('timerBox');
        const scoreBody = document.getElementById('scoreBody');
        const avgText = document.getElementById('avgText');
        const levelText = document.getElementById('levelText');
        let scoreList = [];

        // 更新平均分与等级
        function updateAvgAndLevel() {
            if (scoreList.length === 0) {
                avgText.textContent = "平均成绩：0.000秒";
                levelText.textContent = "暂无成绩";
                return;
            }
            // 计算平均分
            const sum = scoreList.reduce((a, b) => Number(a) + Number(b), 0);
            const avg = (sum / scoreList.length).toFixed(3);
            avgText.textContent = `平均成绩：${avg}秒`;
            // 判断等级
            const avgNum = Number(avg);
            if (avgNum < 10) {
                levelText.textContent = "大佬";
            } else if (avgNum < 20) {
                levelText.textContent = "高手";
            } else {
                levelText.textContent = "萌新";
            }
        }

        timerBox.onclick = () => {
            if (!running) {
                running = true;
                start = performance.now();
                timer = setInterval(() => {
                    timerBox.textContent = ((performance.now() - start) / 1000).toFixed(3);
                }, 10);
            } else {
                running = false;
                clearInterval(timer);
                const time = ((performance.now() - start) / 1000).toFixed(3);
                timerBox.textContent = `${time}`;

                // 新增成绩，无数量上限
                scoreList.push(time);
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${scoreList.length}</td>
                    <td>${time}</td>
                    <td><button class="delBtn">删</button></td>
                `;
                scoreBody.appendChild(tr);

                // 删除按钮逻辑
                tr.querySelector('.delBtn').onclick = function () {
                    const rowIndex = Array.from(scoreBody.children).indexOf(tr);
                    scoreList.splice(rowIndex, 1);
                    tr.remove();
                    // 刷新所有序号
                    Array.from(scoreBody.children).forEach((row, idx) => {
                        row.children[0].textContent = idx + 1;
                    });
                    updateAvgAndLevel();
                }
                updateAvgAndLevel();
            }
        }
    </script>

    <!-- 2D六面展开图 -->
    <scramble-display puzzle="333" size="300"></scramble-display>

    <!-- 打乱生成脚本 -->
    <script type="module">
        import { randomScrambleForEvent } from "https://cdn.cubing.net/v0/js/cubing/scramble";
        async function createNewScramble() {
            const scramble = await randomScrambleForEvent("333");
            const scrambleText = scramble.toString();
            document.querySelector("#scrambleAlg").innerText = scrambleText;
            document.querySelector("scramble-display").scramble = scrambleText;
        }
        createNewScramble();
        document.querySelector("#refreshBtn").onclick = createNewScramble;
    </script>

</body>
</html>
